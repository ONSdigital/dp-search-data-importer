version: '3'
services:
  stream_zookeeper:
    image: confluentinc/cp-zookeeper:5.3.4
    expose:
      - 2181
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
  stream_kafka:
    image: confluentinc/cp-kafka:5.3.4
    ports:
      - 39092:39092
    expose:
      - 9092
    depends_on:
      - stream_zookeeper
    environment:
      - KAFKA_ZOOKEEPER_CONNECT=stream_zookeeper:2181
      - KAFKA_BROKER_ID=1
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://stream_kafka:9092,PLAINTEXT_HOST://localhost:39092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
  stream_sitewideelasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.10.0
    ports:
      # Set alternative ports to prevent port clash.
      - 11300:9300
      - 11200:9200
    environment:
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - "discovery.type=single-node"